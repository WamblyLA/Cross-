name: Deploy backend

on:
  push:
    branches:
      - prod-backend

jobs:
  verify-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.x

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run prisma:generate

      - name: Typecheck backend
        run: bun run typecheck

      - name: Build backend
        run: bun run build

      - name: Run backend tests
        run: bun run test:ci

  deploy:
    runs-on: ubuntu-latest
    needs: verify-backend

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.SERVER_PATH }}"
            git fetch origin
            git checkout prod-backend
            git reset --hard origin/prod-backend
            docker compose up -d --build
            for endpoint in https://api.crosspp.ru/health https://api.crosspp.ru/api/health; do
              echo "Checking $endpoint"
              for attempt in $(seq 1 15); do
                if curl -fsS "$endpoint"; then
                  echo "Healthcheck passed for $endpoint"
                  break
                fi

                if [ "$attempt" -eq 15 ]; then
                  echo "Healthcheck failed for $endpoint after $attempt attempts"
                  exit 1
                fi

                sleep 4
              done
            done
